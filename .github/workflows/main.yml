name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      # Run the same build against each supported Node.js major version.
      matrix:
        node-version: [24.x, 26.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm start --workspaces --if-present

  # Clear GitHub's camo cache for badge images embedded in README.md
  purge-camo-cache:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: kevincobain2000/action-camo-purge@v1
